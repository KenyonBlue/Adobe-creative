services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - STORAGE_ROOT=/app/storage
      - OUTPUTS_ROOT=/app/outputs
      - UPLOADS_ROOT=/app/uploads
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
